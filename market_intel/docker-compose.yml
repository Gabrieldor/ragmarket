# Run from market_intel/: docker compose up -d --build
#
# Equivalent of the three local processes (collector, API, dashboard) plus a one-shot
# migration step, all sharing one persistent volume for the SQLite file.

services:
  migrate:
    build:
      context: ..
      dockerfile: market_intel/Dockerfile
    command: python scripts/init_db.py
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/market_intel.db
    volumes:
      - market_intel_data:/app/data

  api:
    build:
      context: ..
      dockerfile: market_intel/Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/market_intel.db
    volumes:
      - market_intel_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  collector:
    build:
      context: ..
      dockerfile: market_intel/Dockerfile
    command: python collector/runner.py
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/market_intel.db
    volumes:
      - market_intel_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Must be reachable from the *browser*, not an internal Docker hostname --
        # replace with your VPS's public IP or domain before deploying.
        NEXT_PUBLIC_API_BASE_URL: "http://YOUR_SERVER_IP:8000"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  market_intel_data:
